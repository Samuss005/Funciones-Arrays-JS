<head>

    <title>Ejercicio 9</title>

<body>
    <script>
        const palabras = [
            "hola", "mundo", "hola", "js", "mundo",
            "hola", "filter", "js", "hola"
        ]

        const conteo = palabras.reduce(function (acumulador, palabra) {

            if (!acumulador[palabra]) {
                acumulador[palabra] = 0
            }

            acumulador[palabra]++

            return acumulador

        }, {})

        console.log(conteo)
    </script>
</body>

</html>
