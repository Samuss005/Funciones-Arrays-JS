</head>

<body>
    <script>
        const nombres = [
            "ana garcia",
            "luis perez",
            "marta lopez",
            "carlos ruiz"
        ]

        const formateados = nombres.map(nombreCompleto => {
            const partes = nombreCompleto.split(" ")
            const nombre = partes[0]
            const apellido = partes[1]

            return apellido.toUpperCase() + ", " + nombre.charAt(0).toUpperCase() + nombre.slice(1)
        })

        console.log(formateados)
    </script>
</body>

</html>
